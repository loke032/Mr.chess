<head>
    <link rel="icon" href="{{ url_for('static', filename='images/icons8-chess-16.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='2') }}">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<body>
    <div class="top-bar">

    <a href="/">
        <button class="back-button">Back to Game</button>
    </a>
    <h1>Puzzles</h1>
    <a href="/history">
        <button class="puzzles-button">View History</button>
    </a>
    </div>


    <div class="board-container">

    <div id="board" style="width: 500px"></div>
    <div class="message" id="message" ></div>
    <div class = 'checkmate-message' id="checkmate-message"></div>

    </div>
    
    <div class ="bottom-bar">
    
    <a href="/puzzles">
        <button class="new-puzzle-button">New Puzzle</button>
    </a>
    
    <div class="puzzles-streak" id="streak">{{ streak }}🔥</div>

    <button class="puzzle-hint" id="hint" onclick="showHint()">Hint?</button>
    </div>
    
    <form action="/toggle_auto_skip", method="POST">
    <div class auto-skip>
    <button type="submit" id="auto-skip" class="{% if auto_skip == True %}selected{% endif %}">
        {% if auto_skip %}
            Auto Skip: On
        {% else %}
            Auto Skip: Off
        {% endif %}
    </button>
    </div>
    </form>
    <script>
        let currentFen = "{{ fen }}";
        const whiteTurn = JSON.parse('{{ white_turn | tojson | safe }}');
        const turnMessage = "{{ turn_message }}";
        const streak = "{{ streak }}";
        let correct_move = "{{ correct_move }}";
    </script>
    
    
    <script src="{{ url_for('static', filename='js/puzzle_move.js') }}"></script>
</body>
